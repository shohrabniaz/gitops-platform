name: GitOps Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate YAML manifests
        run: |
          pip install pyyaml -q
          python -c "
          import pathlib, yaml, sys
          paths = list(pathlib.Path('apps/overlays/dev').rglob('*.yaml'))
          paths += list(pathlib.Path('argocd/applications').rglob('*.yaml'))
          for p in paths:
              list(yaml.safe_load_all(p.read_text()))
              print('OK', p)
          "
