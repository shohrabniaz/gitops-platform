name: GitOps Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Dry-run apply manifests
        run: |
          kubectl apply --dry-run=client --validate=false -f apps/overlays/dev/
          kubectl apply --dry-run=client --validate=false -f argocd/applications/
