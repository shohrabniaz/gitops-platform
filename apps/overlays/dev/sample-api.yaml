apiVersion: v1
kind: Namespace
metadata:
  name: demo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-api
  template:
    metadata:
      labels:
        app: sample-api
    spec:
      containers:
        - name: api
          image: ghcr.io/YOUR_ORG/sample-api:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: sample-api
  namespace: demo
spec:
  selector:
    app: sample-api
  ports:
    - port: 80
      targetPort: 8080
