apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-demo
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devsecops-demo
  template:
    metadata:
      labels:
        app: devsecops-demo
    spec:
      containers:
        - name: api
          image: ghcr.io/shohrabniaz/devsecops-pipeline:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: devsecops-demo
  namespace: demo
spec:
  selector:
    app: devsecops-demo
  ports:
    - port: 8080
      targetPort: 8080
